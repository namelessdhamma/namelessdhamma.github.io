<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Nameless Dhamma — безграничная мудрость рассекает неведение.">
  <title>Nameless Dhamma</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    :root{
      color-scheme:dark;
      --bg:#000;
      --fg:#f7f7f7;
      --muted:rgba(255,255,255,.56);
      --faint:rgba(255,255,255,.17);
      --line:rgba(255,255,255,.13);
      --glow:rgba(255,255,255,.52);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth;background:#000}
    body{
      margin:0;
      min-height:100%;
      overflow-x:hidden;
      color:var(--fg);
      background:#000;
      font-family:Georgia,"Times New Roman","Noto Serif Thai",serif;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-5;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 23%,rgba(255,255,255,.045),transparent 30rem),
        radial-gradient(ellipse at center,transparent 0 38%,rgba(0,0,0,.88) 100%),
        #000;
    }

    .mist,.mist::before,.mist::after{
      content:"";
      position:fixed;
      inset:-30%;
      z-index:-4;
      pointer-events:none;
      background:
        radial-gradient(ellipse at 31% 30%,rgba(255,255,255,.018),transparent 35%),
        radial-gradient(ellipse at 72% 60%,rgba(255,255,255,.014),transparent 34%);
      filter:blur(42px);
      animation:mist 36s ease-in-out infinite alternate;
    }
    .mist::before{transform:rotate(17deg);animation-duration:44s}
    .mist::after{transform:rotate(-13deg);animation-duration:52s}

    .language{
      position:fixed;
      top:max(14px,env(safe-area-inset-top));
      right:max(16px,env(safe-area-inset-right));
      z-index:50;
      display:flex;
      gap:9px;
      align-items:center;
      color:rgba(255,255,255,.42);
      font-size:.92rem;
    }
    .language button{
      border:0;
      padding:5px 1px;
      background:none;
      color:inherit;
      font:inherit;
      cursor:pointer;
    }
    .language button.active{
      color:#fff;
      text-shadow:0 0 12px rgba(255,255,255,.5);
    }

    section{
      position:relative;
      width:min(100% - 24px,980px);
      margin:auto;
    }

    .temple{
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:54px 0 32px;
      text-align:center;
    }

    .temple-inner{
      display:grid;
      justify-items:center;
      width:100%;
      will-change:transform,opacity;
    }

    .wheel-wrap{
      position:relative;
      isolation:isolate;
      width:min(86vw,620px);
      aspect-ratio:1;
      display:grid;
      place-items:center;
      margin-bottom:-34px;
      animation:wheel-enter 2s ease-out both;
    }

    .wheel-wrap::before{
      content:"";
      position:absolute;
      inset:17%;
      border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,.18),rgba(255,255,255,.035) 42%,transparent 72%);
      filter:blur(28px);
      animation:halo 14s ease-in-out infinite;
    }

    .wheel{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      object-fit:contain;
      filter:
        contrast(1.04)
        drop-shadow(0 0 8px rgba(255,255,255,.28))
        drop-shadow(0 0 30px rgba(255,255,255,.10));
      animation:breathe 15s ease-in-out infinite;
    }

    .core{
      position:absolute;
      z-index:3;
      width:12%;
      aspect-ratio:1;
      border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,.42),rgba(255,255,255,.08) 40%,transparent 72%);
      filter:blur(9px);
      animation:core 12s ease-in-out infinite;
    }

    .particle-field{
      position:absolute;
      inset:-8%;
      z-index:1;
      opacity:.28;
      background-image:
        radial-gradient(circle at 14% 32%,#fff 0 1px,transparent 1.7px),
        radial-gradient(circle at 23% 73%,#fff 0 1px,transparent 1.7px),
        radial-gradient(circle at 38% 12%,#fff 0 1px,transparent 1.7px),
        radial-gradient(circle at 69% 16%,#fff 0 1px,transparent 1.7px),
        radial-gradient(circle at 85% 62%,#fff 0 1px,transparent 1.7px),
        radial-gradient(circle at 91% 35%,#fff 0 1px,transparent 1.7px),
        radial-gradient(circle at 61% 89%,#fff 0 1px,transparent 1.7px);
      filter:drop-shadow(0 0 4px rgba(255,255,255,.5));
      animation:particles 24s ease-in-out infinite alternate;
    }

    h1{
      margin:0;
      color:#fff;
      font-size:clamp(3.3rem,14vw,6.7rem);
      font-weight:400;
      line-height:.88;
      letter-spacing:-.025em;
      text-shadow:0 0 12px rgba(255,255,255,.12);
      animation:text-enter 1.35s .8s ease-out both;
    }
    h1 span{display:block}

    .motto{
      margin:26px auto 0;
      color:rgba(255,255,255,.63);
      font-size:clamp(.72rem,2.5vw,1rem);
      line-height:1.6;
      letter-spacing:.17em;
      animation:text-enter 1.3s 1.15s ease-out both;
    }

    .continue{
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      display:grid;
      justify-items:center;
      color:rgba(255,255,255,.40);
      text-decoration:none;
      font-size:.66rem;
      letter-spacing:.14em;
      animation:text-enter 1.3s 1.65s ease-out both;
    }
    .continue b{
      font-size:1.28rem;
      font-weight:400;
      animation:cue 2.8s ease-in-out infinite;
    }

    .links-section{
      min-height:92svh;
      display:grid;
      align-content:center;
      padding:110px 0;
      isolation:isolate;
    }

    .links-section::before{
      content:"";
      position:absolute;
      z-index:-2;
      left:50%;
      top:50%;
      width:100vw;
      height:min(42vw,430px);
      transform:translate(-50%,-50%);
      background:url("light-horizon.webp") center/cover no-repeat;
      opacity:.72;
      filter:contrast(1.06) brightness(.82);
      pointer-events:none;
      -webkit-mask-image:linear-gradient(to right,transparent 0,#000 10%,#000 90%,transparent 100%);
      mask-image:linear-gradient(to right,transparent 0,#000 10%,#000 90%,transparent 100%);
    }

    .links-section::after{
      content:"";
      position:absolute;
      z-index:-1;
      left:50%;
      top:50%;
      width:min(82vw,920px);
      height:210px;
      transform:translate(-50%,-50%);
      background:radial-gradient(ellipse at center,rgba(255,255,255,.10),rgba(255,255,255,.025) 30%,transparent 72%);
      filter:blur(18px);
      pointer-events:none;
      animation:section-glow 12s ease-in-out infinite;
    }

    .social-grid{
      width:min(100%,760px);
      margin:auto;
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:22px 18px;
      position:relative;
      z-index:2;
    }

    .social-grid::before{
      content:"";
      position:absolute;
      left:5%;
      right:5%;
      top:50%;
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.16) 18%,rgba(255,255,255,.62) 50%,rgba(255,255,255,.16) 82%,transparent);
      box-shadow:0 0 12px rgba(255,255,255,.24),0 0 34px rgba(255,255,255,.10);
      transform:translateY(-50%);
      pointer-events:none;
    }

    .social{
      min-width:0;
      display:grid;
      justify-items:center;
      gap:8px;
      color:rgba(255,255,255,.62);
      text-decoration:none;
      transition:color .2s ease,transform .2s ease;
    }
    .social:hover,.social:focus-visible,.social:active{
      color:#fff;
      transform:translateY(-2px);
      outline:none;
    }

    .social .icon{
      width:68px;
      height:68px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.16);
      border-radius:50%;
      background:
        radial-gradient(circle,rgba(255,255,255,.075),rgba(255,255,255,.018) 46%,rgba(0,0,0,.60) 72%),
        rgba(0,0,0,.32);
      box-shadow:0 0 15px rgba(255,255,255,.045),inset 0 0 14px rgba(255,255,255,.025);
      backdrop-filter:blur(2px);
      transition:border-color .2s ease,box-shadow .2s ease,background .2s ease;
    }
    .social:hover .icon,.social:focus-visible .icon,.social:active .icon{
      border-color:rgba(255,255,255,.44);
      background:radial-gradient(circle,rgba(255,255,255,.13),rgba(255,255,255,.025) 48%,rgba(0,0,0,.50) 72%);
      box-shadow:0 0 12px rgba(255,255,255,.19),0 0 34px rgba(255,255,255,.10),inset 0 0 20px rgba(255,255,255,.05);
    }

    .icon svg{
      width:30px;
      height:30px;
      fill:none;
      stroke:currentColor;
      stroke-width:1.7;
      stroke-linecap:round;
      stroke-linejoin:round;
      filter:drop-shadow(0 0 5px currentColor);
    }
    .icon .fill{fill:currentColor;stroke:none}

    .social small{
      font-size:.76rem;
      letter-spacing:.03em;
    }

    .dana{
      min-height:76svh;
      display:grid;
      align-content:center;
      justify-items:center;
      padding:120px 0 130px;
      text-align:center;
      isolation:isolate;
    }

    .dana::before{
      content:"";
      position:absolute;
      z-index:-2;
      left:50%;
      top:42%;
      width:100vw;
      height:min(38vw,390px);
      transform:translate(-50%,-50%) scaleY(.78);
      background:url("light-horizon.webp") center/cover no-repeat;
      opacity:.42;
      filter:contrast(1.08) brightness(.72) blur(.15px);
      pointer-events:none;
      -webkit-mask-image:linear-gradient(to right,transparent 0,#000 13%,#000 87%,transparent 100%);
      mask-image:linear-gradient(to right,transparent 0,#000 13%,#000 87%,transparent 100%);
    }

    .dana::after{
      content:"";
      position:absolute;
      z-index:-1;
      left:50%;
      top:46%;
      width:min(76vw,780px);
      height:380px;
      transform:translate(-50%,-50%);
      background:radial-gradient(ellipse at center,rgba(255,255,255,.075),transparent 66%);
      filter:blur(28px);
      pointer-events:none;
    }

    .dana h2{
      position:relative;
      margin:0 0 52px;
      font-size:clamp(1.6rem,5vw,2.5rem);
      font-weight:400;
      color:rgba(255,255,255,.82);
      text-shadow:0 0 18px rgba(255,255,255,.12);
    }

    .dana h2::after{
      content:"";
      display:block;
      width:min(48vw,300px);
      height:1px;
      margin:22px auto 0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.50),transparent);
      box-shadow:0 0 12px rgba(255,255,255,.24);
    }

    .accounts{
      width:min(100%,620px);
      display:grid;
      gap:22px;
      position:relative;
    }

    .account{
      padding:0;
      border:0;
      background:none;
      color:inherit;
      font:inherit;
      cursor:pointer;
      position:relative;
      padding:24px 18px 15px;
      border-radius:22px;
      background:radial-gradient(ellipse at center,rgba(255,255,255,.035),rgba(0,0,0,.08) 62%,transparent 76%);
      transition:transform .2s ease,background .2s ease;
    }
    .account::before{
      content:"";
      position:absolute;
      left:8%;
      right:8%;
      top:0;
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),rgba(255,255,255,.68),rgba(255,255,255,.16),transparent);
      box-shadow:0 0 10px rgba(255,255,255,.20),0 0 26px rgba(255,255,255,.07);
    }
    .account:hover,.account:focus-visible{
      transform:translateY(-2px);
      background:radial-gradient(ellipse at center,rgba(255,255,255,.065),rgba(0,0,0,.06) 62%,transparent 76%);
      outline:none;
    }
    .account strong{
      display:block;
      margin-bottom:9px;
      font-size:1.15rem;
      font-weight:400;
      color:rgba(255,255,255,.68);
    }
    .account span{
      display:block;
      color:#fff;
      font-family:ui-monospace,SFMono-Regular,Consolas,monospace;
      font-size:clamp(.98rem,4.2vw,1.35rem);
      letter-spacing:.08em;
      text-shadow:0 0 12px rgba(255,255,255,.13);
    }
    .account em{
      display:block;
      height:18px;
      margin-top:7px;
      color:rgba(255,255,255,.35);
      font-size:.72rem;
      font-style:normal;
    }

    footer{
      padding:22px 16px max(32px,env(safe-area-inset-bottom));
      text-align:center;
      color:rgba(255,255,255,.24);
      font-size:.72rem;
      letter-spacing:.14em;
    }

    @keyframes wheel-enter{
      from{opacity:0;transform:scale(.82);filter:blur(12px)}
      to{opacity:1;transform:scale(1);filter:blur(0)}
    }
    @keyframes text-enter{
      from{opacity:0;transform:translateY(14px);filter:blur(7px)}
      to{opacity:1;transform:none;filter:blur(0)}
    }
    @keyframes breathe{
      0%,100%{transform:scale(.992);opacity:.94}
      50%{transform:scale(1.012);opacity:1}
    }
    @keyframes halo{
      0%,100%{transform:scale(.96);opacity:.52}
      50%{transform:scale(1.05);opacity:.84}
    }
    @keyframes core{
      0%,100%{transform:scale(.88);opacity:.32}
      50%{transform:scale(1.1);opacity:.63}
    }
    @keyframes particles{
      from{transform:translate3d(-7px,5px,0)}
      to{transform:translate3d(8px,-8px,0)}
    }
    @keyframes mist{
      from{transform:translate3d(-3%,-2%,0) scale(1)}
      to{transform:translate3d(4%,3%,0) scale(1.08)}
    }
    @keyframes cue{
      0%,100%{transform:translateY(0);opacity:.35}
      50%{transform:translateY(7px);opacity:.8}
    }
    @keyframes section-glow{
      0%,100%{transform:translate(-50%,-50%) scale(.96);opacity:.55}
      50%{transform:translate(-50%,-50%) scale(1.04);opacity:.92}
    }

    @media(max-width:680px){
      .links-section{padding:90px 0}
      .links-section::before{height:58vw;opacity:.66;background-size:auto 100%}
      .social-grid{
        grid-template-columns:repeat(5,minmax(0,1fr));
        gap:18px 7px;
      }
      .social-grid::before{left:-4vw;right:-4vw}
      .dana{padding:105px 0 115px}
      .dana::before{height:62vw;background-size:auto 100%;opacity:.34}
      .social .icon{width:52px;height:52px}
      .icon svg{width:24px;height:24px}
      .social small{display:none}
      .wheel-wrap{width:min(94vw,620px);margin-bottom:-20px}
      h1{font-size:clamp(3.2rem,15.4vw,4.8rem)}
      .motto{letter-spacing:.12em}
    }

    @media(max-width:390px){
      .social .icon{width:47px;height:47px}
      .social-grid{gap:12px 4px}
    }

    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important;scroll-behavior:auto!important}
    }
  </style>
</head>

  <script>
    const i18n={
      ru:{motto:"БЕЗГРАНИЧНАЯ МУДРОСТЬ<br>РАССЕКАЕТ НЕВЕДЕНИЕ",support:"Поддержать проект",copied:"Скопировано"},
      en:{motto:"BOUNDLESS WISDOM<br>CUTS THROUGH IGNORANCE",support:"Support the project",copied:"Copied"},
      th:{motto:"ปัญญาอันไร้ขอบเขต<br>ตัดผ่านอวิชชา",support:"สนับสนุนโครงการ",copied:"คัดลอกแล้ว"}
    };

    let lang="ru";

    document.querySelectorAll("[data-lang]").forEach(button=>{
      button.addEventListener("click",()=>{
        lang=button.dataset.lang;
        document.documentElement.lang=lang;
        document.querySelectorAll("[data-lang]").forEach(x=>x.classList.toggle("active",x===button));
        document.querySelectorAll("[data-text]").forEach(x=>x.innerHTML=i18n[lang][x.dataset.text]);
      });
    });

    document.querySelectorAll("[data-copy]").forEach(button=>{
      button.addEventListener("click",async()=>{
        const feedback=button.querySelector("em");
        try{
          await navigator.clipboard.writeText(button.dataset.copy);
          feedback.textContent=i18n[lang].copied;
          setTimeout(()=>feedback.textContent="",1400);
        }catch{
          feedback.textContent=button.dataset.copy;
        }
      });
    });

    const temple=document.querySelector(".temple-inner");
    window.addEventListener("scroll",()=>{
      const p=Math.min(window.scrollY/innerHeight,1);
      temple.style.opacity=String(1-p*.72);
      temple.style.transform=`translateY(${p*30}px) scale(${1-p*.035})`;
    },{passive:true});
  </script>
</body>
</html>
