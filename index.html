<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#020202">
  <meta name="description" content="Nameless Dhamma">
  <title>Nameless Dhamma</title>
  <style>
:root {
  color-scheme: dark;
  --bg: #020202;
  --text: #f4f1eb;
  --muted: #aaa59c;
  --line: rgba(255,255,255,.15);
  --glow: rgba(255,255,255,.35);
}

* { box-sizing: border-box; }

html { background: var(--bg); scroll-behavior: smooth; }

body {
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--text);
  background:
    radial-gradient(circle at 50% 22%, rgba(255,255,255,.045), transparent 38rem),
    linear-gradient(#050505, #010101 60%, #040404);
  font-family: Georgia, "Times New Roman", "Noto Serif Thai", serif;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -4;
  background:
    repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,.009) 4px),
    radial-gradient(ellipse at center, transparent 0 45%, rgba(0,0,0,.68) 100%);
}

.site {
  width: min(100% - 24px, 1020px);
  margin: auto;
  padding: 22px 0 52px;
}

.languages {
  position: relative;
  z-index: 20;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 11px;
  color: #a9a49c;
  font-size: 1.05rem;
}

.language {
  border: 0;
  padding: 5px 2px;
  background: transparent;
  color: inherit;
  font: inherit;
  cursor: pointer;
  text-shadow: 0 0 14px transparent;
  transition: color .2s ease, text-shadow .2s ease;
}

.language.active,
.language:hover {
  color: #fff;
  text-shadow: 0 0 11px rgba(255,255,255,.65);
}

.hero {
  text-align: center;
  padding-top: 4px;
}

.wheel-stage {
  position: relative;
  isolation: isolate;
  width: min(92vw, 650px);
  aspect-ratio: 1;
  margin: -6px auto -12px;
  display: grid;
  place-items: center;
}

.wheel {
  position: relative;
  z-index: 3;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  mix-blend-mode: screen;
  opacity: .94;
  animation: wheelBreath 9s ease-in-out infinite;
  filter:
    contrast(1.08)
    drop-shadow(0 0 13px rgba(255,255,255,.38))
    drop-shadow(0 0 42px rgba(255,255,255,.14));
}

.wheel-stage::before {
  content: "";
  position: absolute;
  inset: 18%;
  z-index: 0;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.19), rgba(255,255,255,.04) 38%, transparent 72%);
  filter: blur(24px);
  animation: haloBreath 9s ease-in-out infinite;
}

.rays {
  position: absolute;
  inset: -14%;
  z-index: 1;
  border-radius: 50%;
  opacity: .26;
  background:
    conic-gradient(
      from 0deg,
      transparent 0 11deg, rgba(255,255,255,.065) 12deg 15deg,
      transparent 16deg 43deg, rgba(255,255,255,.034) 44deg 47deg,
      transparent 48deg 87deg, rgba(255,255,255,.055) 88deg 92deg,
      transparent 93deg 132deg, rgba(255,255,255,.032) 133deg 137deg,
      transparent 138deg 177deg, rgba(255,255,255,.055) 178deg 182deg,
      transparent 183deg 222deg, rgba(255,255,255,.032) 223deg 227deg,
      transparent 228deg 267deg, rgba(255,255,255,.055) 268deg 272deg,
      transparent 273deg 312deg, rgba(255,255,255,.032) 313deg 317deg,
      transparent 318deg 360deg
    );
  filter: blur(17px);
  animation: raysBreath 11s ease-in-out infinite;
}

.particles {
  position: absolute;
  inset: -8%;
  z-index: 2;
  opacity: .52;
  background-image:
    radial-gradient(circle at 12% 32%, #fff 0 1px, transparent 1.8px),
    radial-gradient(circle at 23% 69%, #fff 0 1px, transparent 1.7px),
    radial-gradient(circle at 36% 18%, #fff 0 1px, transparent 1.8px),
    radial-gradient(circle at 51% 7%, #fff 0 1px, transparent 1.8px),
    radial-gradient(circle at 65% 24%, #fff 0 1px, transparent 1.8px),
    radial-gradient(circle at 79% 62%, #fff 0 1px, transparent 1.8px),
    radial-gradient(circle at 91% 38%, #fff 0 1px, transparent 1.8px),
    radial-gradient(circle at 62% 86%, #fff 0 1px, transparent 1.8px),
    radial-gradient(circle at 18% 51%, #fff 0 .8px, transparent 1.6px);
  filter: drop-shadow(0 0 5px #fff);
  animation: particlesFloat 14s ease-in-out infinite alternate;
}

.wheel-flare {
  position: absolute;
  z-index: 4;
  width: 18%;
  aspect-ratio: 1;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.48), rgba(255,255,255,.08) 32%, transparent 72%);
  filter: blur(9px);
  animation: corePulse 7s ease-in-out infinite;
}

h1 {
  margin: 0;
  display: flex;
  flex-direction: column;
  font-size: clamp(4rem, 12vw, 7.4rem);
  font-weight: 400;
  line-height: .84;
  letter-spacing: -.025em;
  color: #fff;
  text-shadow:
    0 0 4px rgba(255,255,255,.96),
    0 0 15px rgba(255,255,255,.52),
    0 0 46px rgba(255,255,255,.15);
  animation: titleRise 1.5s ease-out both;
}

.tagline {
  margin: 30px 0 24px;
  color: #bdb8af;
  font-size: clamp(.73rem, 2.5vw, 1rem);
  line-height: 1.55;
  letter-spacing: .27em;
  text-shadow: 0 0 15px rgba(255,255,255,.12);
}

.divider,
.footer-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 13px;
  color: #9c978e;
}

.divider span {
  width: min(34vw, 255px);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line));
}

.divider span:last-child {
  background: linear-gradient(90deg, var(--line), transparent);
}

.divider b,
.footer-line b {
  font-weight: 400;
  text-shadow: 0 0 12px rgba(255,255,255,.36);
}

.links {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 15px;
  margin-top: 38px;
}

.card {
  position: relative;
  overflow: hidden;
  min-height: 102px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 16px;
  padding: 17px 20px;
  border: 1px solid rgba(255,255,255,.17);
  border-radius: 18px;
  background:
    linear-gradient(145deg, rgba(255,255,255,.034), rgba(255,255,255,.006));
  color: var(--text);
  font: inherit;
  font-size: clamp(1rem, 3.1vw, 1.35rem);
  text-decoration: none;
  cursor: pointer;
  transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
}

.card::before {
  content: "";
  position: absolute;
  inset: -85%;
  opacity: 0;
  background: radial-gradient(circle, rgba(255,255,255,.16), transparent 42%);
  transition: opacity .2s ease;
}

.card:hover,
.card:focus-visible,
.card:active {
  transform: translateY(-3px);
  border-color: rgba(255,255,255,.34);
  background: rgba(255,255,255,.052);
  box-shadow:
    0 0 28px rgba(255,255,255,.05),
    inset 0 0 24px rgba(255,255,255,.024);
  outline: none;
}

.card:hover::before,
.card:focus-visible::before,
.card:active::before { opacity: 1; }

.icon {
  position: relative;
  z-index: 1;
  flex: 0 0 auto;
  width: 57px;
  height: 57px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 16px;
  background: rgba(255,255,255,.028);
  font-family: system-ui, sans-serif;
  font-size: 1.55rem;
  font-weight: 700;
  text-shadow:
    0 0 5px rgba(255,255,255,.95),
    0 0 17px rgba(255,255,255,.28);
  box-shadow: 0 0 16px rgba(255,255,255,.025);
}

.icon.compact { font-size: .95rem; }

.card > span:not(.icon),
.stack {
  position: relative;
  z-index: 1;
}

.stack {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.stack small {
  margin-top: 4px;
  color: #aaa59d;
  font-size: .67em;
}

footer { margin-top: 54px; }

.footer-line {
  gap: 15px;
  color: #aaa59c;
}

.footer-line span {
  flex: 1;
  max-width: 210px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line));
}

.footer-line span:last-child {
  background: linear-gradient(90deg, var(--line), transparent);
}

.footer-line strong {
  font-weight: 400;
  letter-spacing: .12em;
}

.ambient {
  position: fixed;
  z-index: -2;
  width: 45vw;
  aspect-ratio: 1;
  border-radius: 50%;
  filter: blur(80px);
  opacity: .025;
  background: #fff;
  pointer-events: none;
}

.ambient-one { left: -24vw; top: 20vh; }
.ambient-two { right: -24vw; top: 60vh; }

@keyframes wheelBreath {
  0%,100% { transform: scale(.985); opacity: .88; }
  50% { transform: scale(1.025); opacity: 1; }
}

@keyframes haloBreath {
  0%,100% { transform: scale(.94); opacity: .56; }
  50% { transform: scale(1.06); opacity: 1; }
}

@keyframes raysBreath {
  0%,100% { transform: scale(.97); opacity: .15; }
  50% { transform: scale(1.04); opacity: .31; }
}

@keyframes particlesFloat {
  from { transform: translate3d(-7px, 4px, 0) scale(.98); }
  to { transform: translate3d(8px, -8px, 0) scale(1.03); }
}

@keyframes corePulse {
  0%,100% { transform: scale(.82); opacity: .35; }
  50% { transform: scale(1.14); opacity: .78; }
}

@keyframes titleRise {
  from { opacity: 0; transform: translateY(18px); filter: blur(10px); }
  to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

@media (min-width: 780px) {
  .links { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .card { min-height: 112px; }
  .links .card:nth-last-child(-n+2) { grid-column: span 1; }
}

@media (max-width: 480px) {
  .site { width: min(100% - 16px, 1020px); }
  .languages { font-size: .95rem; }
  .wheel-stage { width: min(105vw, 650px); margin-left: 50%; transform: translateX(-50%); }
  h1 { font-size: clamp(4.1rem, 18vw, 5.5rem); }
  .tagline { letter-spacing: .20em; }
  .card { min-height: 92px; padding: 13px; gap: 11px; }
  .icon { width: 50px; height: 50px; border-radius: 14px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
  }
}

</style>
</head>

<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <main class="site">
    <nav class="languages" aria-label="Language">
      <button class="language active" type="button" data-language="ru">RU</button>
      <span>│</span>
      <button class="language" type="button" data-language="en">EN</button>
      <span>│</span>
      <button class="language" type="button" data-language="th">ไทย</button>
    </nav>

    <header class="hero">
      <div class="wheel-stage" aria-hidden="true">
        <div class="rays"></div>
        <div class="particles"></div>
        <img class="wheel" src="wheel.webp" alt="">
        <div class="wheel-flare"></div>
      </div>

      <h1><span>Nameless</span><span>Dhamma</span></h1>

      <p class="tagline" data-text="tagline">
        БЕЗГРАНИЧНАЯ МУДРОСТЬ,<br>ПРОНИЗЫВАЮЩАЯ НЕВЕДЕНИЕ
      </p>

      <div class="divider" aria-hidden="true"><span></span><b>◇</b><span></span></div>
    </header>

    <section class="links" aria-label="Project links">
      <a class="card" href="https://www.youtube.com/@NamelessDhamma" target="_blank" rel="noopener">
        <span class="icon">▶</span><span>YouTube</span>
      </a>

      <a class="card" href="https://t.me/namelessdhamma" target="_blank" rel="noopener">
        <span class="icon">➤</span><span>Telegram</span>
      </a>

      <a class="card" href="https://www.instagram.com/namelessdhamma/" target="_blank" rel="noopener">
        <span class="icon">◎</span><span>Instagram</span>
      </a>

      <a class="card" href="https://www.tiktok.com/@namelessdhamma" target="_blank" rel="noopener">
        <span class="icon">♪</span><span>TikTok</span>
      </a>

      <a class="card" href="https://www.facebook.com/@NamelessDhamma" target="_blank" rel="noopener">
        <span class="icon">f</span><span>Facebook</span>
      </a>

      <a class="card" href="https://vk.com/namelessdhamma" target="_blank" rel="noopener">
        <span class="icon compact">VK</span><span>VK</span>
      </a>

      <a class="card" href="https://line.me/R/ti/p/@namelessdhamma" target="_blank" rel="noopener">
        <span class="icon compact">LINE</span><span>Line</span>
      </a>

      <button class="card card-button" type="button" data-whatsapp>
        <span class="icon">◔</span>
        <span class="stack"><span>WhatsApp</span><small>@namelessdhamma</small></span>
      </button>

      <a class="card" href="mailto:namelessdhamma@gmail.com">
        <span class="icon">✉</span><span data-text="email">Эл. почта</span>
      </a>

      <a class="card" href="https://dzen.ru/namelessdhamma" target="_blank" rel="noopener">
        <span class="icon">✦</span><span>Дзен</span>
      </a>
    </section>

    <footer>
      <div class="footer-line"><span></span><b>◇</b><strong>@namelessdhamma</strong><b>◇</b><span></span></div>
    </footer>
  </main>

  <script>
const translations = {
  ru: {
    tagline: "БЕЗГРАНИЧНАЯ МУДРОСТЬ,<br>ПРОНИЗЫВАЮЩАЯ НЕВЕДЕНИЕ",
    email: "Эл. почта",
    whatsappNotice: "Для прямой ссылки WhatsApp нужен номер телефона или ссылка на канал. Сейчас указано имя @namelessdhamma."
  },
  en: {
    tagline: "BOUNDLESS WISDOM<br>PIERCING THROUGH IGNORANCE",
    email: "Email",
    whatsappNotice: "A direct WhatsApp link requires a phone number or channel URL. The current handle is @namelessdhamma."
  },
  th: {
    tagline: "ปัญญาอันไร้ขอบเขต<br>ที่ส่องทะลุอวิชชา",
    email: "อีเมล",
    whatsappNotice: "ลิงก์ WhatsApp โดยตรงต้องใช้หมายเลขโทรศัพท์หรือลิงก์ช่อง ขณะนี้แสดงชื่อ @namelessdhamma"
  }
};

let currentLanguage = "ru";

document.querySelectorAll("[data-language]").forEach((button) => {
  button.addEventListener("click", () => {
    currentLanguage = button.dataset.language;
    document.documentElement.lang = currentLanguage;

    document.querySelectorAll("[data-language]").forEach((item) => {
      item.classList.toggle("active", item === button);
    });

    document.querySelectorAll("[data-text]").forEach((node) => {
      const key = node.dataset.text;
      node.innerHTML = translations[currentLanguage][key];
    });
  });
});

document.querySelector("[data-whatsapp]").addEventListener("click", () => {
  alert(translations[currentLanguage].whatsappNotice);
});

</script>
</body>
</html>
