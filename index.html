<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#020202">
  <meta name="description" content="Nameless Dhamma — безграничная мудрость, пронизывающая неведение.">
  <title>Nameless Dhamma</title>

  <style>
    :root{
      color-scheme:dark;
      --bg:#020202;
      --paper:#f6f3ed;
      --muted:#a9a49b;
      --line:rgba(255,255,255,.15);
      --line-hover:rgba(255,255,255,.36);
    }
    *{box-sizing:border-box}
    html{background:var(--bg);scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      overflow-x:hidden;
      color:var(--paper);
      background:
        radial-gradient(circle at 50% 16%,rgba(255,255,255,.055),transparent 35rem),
        linear-gradient(180deg,#060606,#010101 62%,#050505);
      font-family:Georgia,"Times New Roman","Noto Serif Thai",serif;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-3;
      pointer-events:none;
      background:
        repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.007) 4px),
        radial-gradient(ellipse at center,transparent 0 42%,rgba(0,0,0,.76) 100%);
    }
    .page{
      width:min(100% - 16px,1040px);
      margin:auto;
      padding:max(14px,env(safe-area-inset-top)) 0 42px;
    }
    .languages{
      position:relative;
      z-index:20;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:9px;
      min-height:34px;
      color:#8f8b84;
      font-size:.96rem;
    }
    .languages button{
      border:0;
      padding:5px 2px;
      background:none;
      color:inherit;
      font:inherit;
      cursor:pointer;
    }
    .languages button.active{
      color:#fff;
      text-shadow:0 0 12px rgba(255,255,255,.75);
    }
    .hero{
      position:relative;
      text-align:center;
    }
    .wheel-stage{
      position:relative;
      isolation:isolate;
      width:min(72vw,500px);
      aspect-ratio:1;
      display:grid;
      place-items:center;
      margin:-6px auto -30px;
    }
    .wheel-stage::before{
      content:"";
      position:absolute;
      inset:12%;
      border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,.23),rgba(255,255,255,.055) 34%,transparent 72%);
      filter:blur(25px);
      animation:halo 9s ease-in-out infinite;
    }
    .rays{
      position:absolute;
      inset:-14%;
      border-radius:50%;
      opacity:.24;
      background:conic-gradient(from 0deg,
        transparent 0 10deg,rgba(255,255,255,.075) 11deg 15deg,
        transparent 16deg 43deg,rgba(255,255,255,.034) 44deg 48deg,
        transparent 49deg 88deg,rgba(255,255,255,.062) 89deg 93deg,
        transparent 94deg 133deg,rgba(255,255,255,.034) 134deg 138deg,
        transparent 139deg 178deg,rgba(255,255,255,.062) 179deg 183deg,
        transparent 184deg 223deg,rgba(255,255,255,.034) 224deg 228deg,
        transparent 229deg 268deg,rgba(255,255,255,.062) 269deg 273deg,
        transparent 274deg 313deg,rgba(255,255,255,.034) 314deg 318deg,
        transparent 319deg 360deg);
      filter:blur(19px);
      animation:rays 11s ease-in-out infinite;
    }
    .particles{
      position:absolute;
      inset:-8%;
      opacity:.46;
      background-image:
        radial-gradient(circle at 7% 36%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 18% 71%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 34% 14%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 53% 5%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 70% 20%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 84% 62%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 94% 37%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 61% 89%,#fff 0 1px,transparent 1.8px);
      filter:drop-shadow(0 0 5px #fff);
      animation:particles 15s ease-in-out infinite alternate;
    }
    .wheel{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      object-fit:contain;
      filter:
        contrast(1.08)
        drop-shadow(0 0 10px rgba(255,255,255,.48))
        drop-shadow(0 0 38px rgba(255,255,255,.18));
      animation:breathe 9s ease-in-out infinite;
    }
    .core{
      position:absolute;
      z-index:3;
      width:13%;
      aspect-ratio:1;
      border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,.55),rgba(255,255,255,.08) 36%,transparent 72%);
      filter:blur(8px);
      animation:core 7s ease-in-out infinite;
    }
    h1{
      margin:0;
      display:flex;
      flex-direction:column;
      color:white;
      font-size:clamp(3.25rem,13.2vw,6.1rem);
      font-weight:400;
      line-height:.86;
      letter-spacing:-.025em;
      text-shadow:
        0 0 3px rgba(255,255,255,.94),
        0 0 11px rgba(255,255,255,.42),
        0 0 34px rgba(255,255,255,.13);
    }
    .tagline{
      margin:23px auto 18px;
      color:#bbb7af;
      font-size:clamp(.66rem,2.35vw,.93rem);
      line-height:1.55;
      letter-spacing:.21em;
      text-shadow:0 0 14px rgba(255,255,255,.11);
    }
    .divider,.footer{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      color:#9b978f;
    }
    .divider span,.footer span{
      flex:1;
      max-width:240px;
      height:1px;
      background:linear-gradient(90deg,transparent,var(--line));
    }
    .divider span:last-child,.footer span:last-child{
      background:linear-gradient(90deg,var(--line),transparent);
    }
    .divider b,.footer b{
      font-weight:400;
      text-shadow:0 0 12px rgba(255,255,255,.38);
    }
    .links{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-top:23px;
    }
    .card{
      position:relative;
      min-width:0;
      min-height:76px;
      overflow:hidden;
      display:flex;
      align-items:center;
      gap:11px;
      padding:11px 12px;
      border:1px solid var(--line);
      border-radius:15px;
      background:
        linear-gradient(145deg,rgba(255,255,255,.042),rgba(255,255,255,.007));
      color:var(--paper);
      text-decoration:none;
      font:inherit;
      font-size:clamp(.91rem,2.9vw,1.16rem);
      transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease;
      backdrop-filter:blur(7px);
      -webkit-backdrop-filter:blur(7px);
    }
    .card::after{
      content:"";
      position:absolute;
      inset:-100%;
      opacity:0;
      background:radial-gradient(circle,rgba(255,255,255,.16),transparent 41%);
      transition:opacity .2s ease;
    }
    .card:hover,.card:focus-visible,.card:active{
      transform:translateY(-2px);
      border-color:var(--line-hover);
      background:rgba(255,255,255,.055);
      box-shadow:0 0 28px rgba(255,255,255,.05),inset 0 0 22px rgba(255,255,255,.025);
      outline:none;
    }
    .card:hover::after,.card:focus-visible::after,.card:active::after{opacity:1}
    .icon{
      position:relative;
      z-index:1;
      flex:0 0 auto;
      width:46px;
      height:46px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.19);
      border-radius:13px;
      background:rgba(255,255,255,.028);
      box-shadow:inset 0 0 17px rgba(255,255,255,.024);
    }
    .icon svg{
      width:25px;
      height:25px;
      fill:none;
      stroke:#fff;
      stroke-width:1.8;
      stroke-linecap:round;
      stroke-linejoin:round;
      filter:drop-shadow(0 0 5px rgba(255,255,255,.72));
    }
    .icon .fill{fill:#fff;stroke:none}
    .label,.stack{position:relative;z-index:1;min-width:0}
    .stack{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      overflow:hidden;
    }
    .stack small{
      width:100%;
      margin-top:3px;
      overflow:hidden;
      color:var(--muted);
      font-size:.62em;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .footer{
      margin-top:30px;
      color:var(--muted);
    }
    .footer strong{
      min-width:0;
      overflow:hidden;
      font-weight:400;
      letter-spacing:.1em;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    @keyframes breathe{0%,100%{transform:scale(.985);opacity:.9}50%{transform:scale(1.02);opacity:1}}
    @keyframes halo{0%,100%{transform:scale(.95);opacity:.58}50%{transform:scale(1.05);opacity:1}}
    @keyframes rays{0%,100%{transform:scale(.98);opacity:.14}50%{transform:scale(1.04);opacity:.3}}
    @keyframes particles{from{transform:translate3d(-6px,4px,0) scale(.99)}to{transform:translate3d(7px,-7px,0) scale(1.03)}}
    @keyframes core{0%,100%{transform:scale(.84);opacity:.36}50%{transform:scale(1.12);opacity:.78}}

    @media(min-width:760px){
      .links{grid-template-columns:repeat(4,minmax(0,1fr))}
      .wheel-stage{width:min(53vw,520px)}
    }
    @media(max-width:420px){
      .page{width:min(100% - 12px,1040px)}
      .wheel-stage{width:min(76vw,500px)}
      h1{font-size:clamp(3.1rem,14.4vw,4.45rem)}
      .tagline{letter-spacing:.16em}
      .card{min-height:72px;padding:10px}
      .icon{width:43px;height:43px}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important}
    }
  </style>
</head>

<script>
  const translations={
    ru:{tagline:"БЕЗГРАНИЧНАЯ МУДРОСТЬ,<br>ПРОНИЗЫВАЮЩАЯ НЕВЕДЕНИЕ",email:"Эл. почта"},

    th:{tagline:"ปัญญาอันไร้ขอบเขต<br>ที่ส่องทะลุอวิชชา",email:"อีเมล"}
  };
  document.querySelectorAll("[data-language]").forEach(button=>{
    button.addEventListener("click",()=>{
      const lang=button.dataset.language;
      document.documentElement.lang=lang;
      document.querySelectorAll("[data-language]").forEach(x=>x.classList.toggle("active",x===button));
      document.querySelectorAll("[data-text]").forEach(x=>x.innerHTML=translations[lang][x.dataset.text]);
    });
  });
</script>
