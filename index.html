<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#020202">
  <meta name="description" content="Nameless Dhamma — безграничная мудрость, пронизывающая неведение.">
  <title>Nameless Dhamma</title>

  <style>
    :root{
      color-scheme:dark;
      --bg:#020202;
      --text:#f5f2ec;
      --muted:#aaa59d;
      --line:rgba(255,255,255,.14);
      --line-strong:rgba(255,255,255,.34);
    }

    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg)}
    body{
      overflow:hidden;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 17%,rgba(255,255,255,.065),transparent 35rem),
        linear-gradient(180deg,#070707 0%,#010101 64%,#040404 100%);
      font-family:Georgia,"Times New Roman","Noto Serif Thai",serif;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-3;
      pointer-events:none;
      background:
        repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.007) 4px),
        radial-gradient(ellipse at center,transparent 0 44%,rgba(0,0,0,.75) 100%);
    }

    .page{
      width:min(100% - 14px,1040px);
      height:100dvh;
      min-height:100svh;
      margin:auto;
      padding:max(8px,env(safe-area-inset-top)) 0 max(8px,env(safe-area-inset-bottom));
      display:grid;
      grid-template-rows:auto minmax(0,37%) minmax(0,1fr) auto;
      gap:7px;
      overflow:hidden;
    }

    .languages{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:8px;
      min-height:26px;
      padding-right:3px;
      color:#8f8b84;
      font-size:clamp(.76rem,2.8vw,.96rem);
      line-height:1;
    }

    .languages button{
      border:0;
      padding:3px 1px;
      background:none;
      color:inherit;
      font:inherit;
      cursor:pointer;
    }

    .languages button.active{
      color:#fff;
      text-shadow:0 0 12px rgba(255,255,255,.72);
    }

    .hero{
      min-height:0;
      display:grid;
      grid-template-rows:minmax(0,1fr) auto auto auto;
      align-items:center;
      justify-items:center;
      text-align:center;
    }

    .wheel-stage{
      position:relative;
      isolation:isolate;
      height:100%;
      max-height:27dvh;
      aspect-ratio:1;
      display:grid;
      place-items:center;
      margin:auto;
    }

    .wheel-stage::before{
      content:"";
      position:absolute;
      inset:12%;
      border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,.23),rgba(255,255,255,.055) 35%,transparent 72%);
      filter:blur(21px);
      animation:halo 9s ease-in-out infinite;
    }

    .rays{
      position:absolute;
      inset:-16%;
      border-radius:50%;
      opacity:.24;
      background:conic-gradient(from 0deg,
        transparent 0 10deg,rgba(255,255,255,.075) 11deg 15deg,
        transparent 16deg 43deg,rgba(255,255,255,.032) 44deg 48deg,
        transparent 49deg 88deg,rgba(255,255,255,.06) 89deg 93deg,
        transparent 94deg 133deg,rgba(255,255,255,.032) 134deg 138deg,
        transparent 139deg 178deg,rgba(255,255,255,.06) 179deg 183deg,
        transparent 184deg 223deg,rgba(255,255,255,.032) 224deg 228deg,
        transparent 229deg 268deg,rgba(255,255,255,.06) 269deg 273deg,
        transparent 274deg 313deg,rgba(255,255,255,.032) 314deg 318deg,
        transparent 319deg 360deg);
      filter:blur(17px);
      animation:rays 11s ease-in-out infinite;
    }

    .particles{
      position:absolute;
      inset:-9%;
      opacity:.43;
      background-image:
        radial-gradient(circle at 7% 36%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 18% 71%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 34% 14%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 53% 5%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 70% 20%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 84% 62%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 94% 37%,#fff 0 1px,transparent 1.8px),
        radial-gradient(circle at 61% 89%,#fff 0 1px,transparent 1.8px);
      filter:drop-shadow(0 0 4px #fff);
      animation:particles 15s ease-in-out infinite alternate;
    }

    .wheel{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      object-fit:contain;
      filter:
        contrast(1.08)
        drop-shadow(0 0 9px rgba(255,255,255,.48))
        drop-shadow(0 0 30px rgba(255,255,255,.17));
      animation:breathe 9s ease-in-out infinite;
    }

    .core{
      position:absolute;
      z-index:3;
      width:13%;
      aspect-ratio:1;
      border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,.56),rgba(255,255,255,.08) 36%,transparent 72%);
      filter:blur(7px);
      animation:core 7s ease-in-out infinite;
    }

    h1{
      margin:-4px 0 0;
      color:#fff;
      font-size:clamp(2rem,8.8vw,4.8rem);
      font-weight:400;
      line-height:.88;
      letter-spacing:-.025em;
      text-shadow:
        0 0 3px rgba(255,255,255,.93),
        0 0 10px rgba(255,255,255,.4),
        0 0 28px rgba(255,255,255,.13);
    }

    h1 span{display:block}

    .tagline{
      margin:8px auto 7px;
      color:#b9b5ad;
      font-size:clamp(.48rem,1.85vw,.79rem);
      line-height:1.45;
      letter-spacing:.18em;
      text-shadow:0 0 11px rgba(255,255,255,.1);
    }

    .divider,.footer{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      color:#918d86;
    }

    .divider span,.footer span{
      flex:1;
      max-width:210px;
      height:1px;
      background:linear-gradient(90deg,transparent,var(--line));
    }

    .divider span:last-child,.footer span:last-child{
      background:linear-gradient(90deg,var(--line),transparent);
    }

    .divider b,.footer b{
      font-size:.75rem;
      font-weight:400;
      text-shadow:0 0 10px rgba(255,255,255,.34);
    }

    .links{
      min-height:0;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      grid-template-rows:repeat(5,minmax(0,1fr));
      gap:6px;
    }

    .card{
      position:relative;
      min-width:0;
      min-height:0;
      overflow:hidden;
      display:flex;
      align-items:center;
      gap:8px;
      padding:5px 8px;
      border:1px solid var(--line);
      border-radius:12px;
      background:linear-gradient(145deg,rgba(255,255,255,.035),rgba(255,255,255,.005));
      color:var(--text);
      text-decoration:none;
      font:inherit;
      font-size:clamp(.72rem,2.7vw,1rem);
      transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
    }

    .card::after{
      content:"";
      position:absolute;
      inset:-100%;
      opacity:0;
      background:radial-gradient(circle,rgba(255,255,255,.14),transparent 40%);
      transition:opacity .2s ease;
    }

    .card:hover,.card:focus-visible,.card:active{
      transform:translateY(-1px);
      border-color:var(--line-strong);
      background:rgba(255,255,255,.05);
      box-shadow:0 0 22px rgba(255,255,255,.045),inset 0 0 18px rgba(255,255,255,.02);
      outline:none;
    }

    .card:hover::after,.card:focus-visible::after,.card:active::after{opacity:1}

    .icon{
      position:relative;
      z-index:1;
      flex:0 0 auto;
      width:clamp(30px,8.5vw,42px);
      height:clamp(30px,8.5vw,42px);
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.17);
      border-radius:10px;
      background:rgba(255,255,255,.022);
    }

    .icon svg{
      width:58%;
      height:58%;
      fill:none;
      stroke:#fff;
      stroke-width:1.8;
      stroke-linecap:round;
      stroke-linejoin:round;
      filter:drop-shadow(0 0 4px rgba(255,255,255,.65));
    }

    .icon .fill{fill:#fff;stroke:none}
    .label,.stack{position:relative;z-index:1;min-width:0}
    .stack{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      overflow:hidden;
    }
    .stack small{
      width:100%;
      margin-top:1px;
      overflow:hidden;
      color:var(--muted);
      font-size:.58em;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .footer{
      min-height:20px;
      color:var(--muted);
    }

    .footer strong{
      min-width:0;
      overflow:hidden;
      font-size:clamp(.66rem,2.4vw,.88rem);
      font-weight:400;
      letter-spacing:.09em;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    @keyframes breathe{0%,100%{transform:scale(.985);opacity:.9}50%{transform:scale(1.02);opacity:1}}
    @keyframes halo{0%,100%{transform:scale(.95);opacity:.56}50%{transform:scale(1.05);opacity:1}}
    @keyframes rays{0%,100%{transform:scale(.98);opacity:.13}50%{transform:scale(1.04);opacity:.29}}
    @keyframes particles{from{transform:translate3d(-5px,3px,0) scale(.99)}to{transform:translate3d(6px,-6px,0) scale(1.03)}}
    @keyframes core{0%,100%{transform:scale(.84);opacity:.35}50%{transform:scale(1.12);opacity:.76}}

    @media(min-width:760px){
      .page{grid-template-rows:auto minmax(0,58%) minmax(0,1fr) auto}
      .links{
        grid-template-columns:repeat(5,minmax(0,1fr));
        grid-template-rows:repeat(2,minmax(0,1fr));
      }
      .wheel-stage{max-height:37dvh}
      h1{font-size:clamp(3rem,6vw,5.1rem)}
    }

    @media(max-height:700px){
      .page{grid-template-rows:auto minmax(0,34%) minmax(0,1fr) auto;gap:5px}
      .wheel-stage{max-height:23dvh}
      .tagline{margin:5px auto}
      .links{gap:4px}
      .card{padding:3px 7px;border-radius:10px}
      .footer{min-height:16px}
    }

    @media(max-height:600px){
      .tagline{display:none}
      .page{grid-template-rows:auto minmax(0,31%) minmax(0,1fr) auto}
      .wheel-stage{max-height:21dvh}
    }

    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important}
    }
  </style>
</head>

<script>
  const translations={
    ru:{tagline:"БЕЗГРАНИЧНАЯ МУДРОСТЬ,<br>ПРОНИЗЫВАЮЩАЯ НЕВЕДЕНИЕ",email:"Эл. почта"},
    en:{tagline:"BOUNDLESS WISDOM<br>PIERCING THROUGH IGNORANCE",email:"Email"},
    th:{tagline:"ปัญญาอันไร้ขอบเขต<br>ที่ส่องทะลุอวิชชา",email:"อีเมล"}
  };

  document.querySelectorAll("[data-language]").forEach(button=>{
    button.addEventListener("click",()=>{
      const lang=button.dataset.language;
      document.documentElement.lang=lang;
      document.querySelectorAll("[data-language]").forEach(x=>x.classList.toggle("active",x===button));
      document.querySelectorAll("[data-text]").forEach(x=>x.innerHTML=translations[lang][x.dataset.text]);
    });
  });
</script>
